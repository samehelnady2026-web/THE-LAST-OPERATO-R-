<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE LAST OPERATOR - FINAL</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --blue: #00d2ff; --pink: #ff4081; --yellow: #ffeb3b; --glass: rgba(255, 255, 255, 0.2); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Arial', sans-serif; }
        body { background: #050505; color: #fff; width: 100vw; height: 100vh; overflow: hidden; touch-action: none; }
        .screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, #1a1a2e 0%, #050505 100%); z-index: 200; }
        .hidden { display: none !important; }
        .glass-card { background: var(--glass); backdrop-filter: blur(15px); padding: 25px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.3); text-align: center; width: 90%; max-width: 400px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 12px; border: none; text-align: center; }
        button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-blue { background: var(--blue); color: #000; }
        .btn-pink { background: var(--pink); color: #fff; }
        #hud { position: fixed; top: 10px; width: 100%; display: flex; justify-content: center; gap: 5px; z-index: 100; pointer-events: none; }
        .stat-box { background: #fff; color: #333; padding: 5px 8px; border-radius: 12px; font-weight: bold; font-size: 0.75rem; min-width: 60px; text-align: center; border: 2px solid #9c27b0; }
        canvas { display: block; }
    </style>
</head>
<body>

<div id="flash-effect" style="position:fixed; inset:0; background:white; opacity:0; pointer-events:none; z-index:300;"></div>

<div id="auth-screen" class="screen">
    <div class="glass-card">
        <h1 style="color:var(--yellow); margin-bottom:15px;">THE LAST OPERATOR</h1>
        <input type="email" id="u-email" placeholder="البريد الإلكتروني">
        <input type="password" id="u-pass" placeholder="كلمة المرور">
        <div style="display: flex; gap: 5px;">
            <button class="btn-pink" onclick="Auth.signIn()">دخول 🔑</button>
            <button class="btn-blue" onclick="Auth.signUp()">تسجيل 📧</button>
        </div>
        <button style="background:#555; color:white;" onclick="Auth.playAsGuest()">اللعب كضيف 🎮</button>
        <hr style="margin:10px; opacity:0.3">
        <button style="background:#2ecc71; color:white;" onclick="Auth.signInByPhone()">دخول بالهاتف + PIN 📱</button>
    </div>
</div>

<div id="hud" class="hidden">
    <div class="stat-box">❤️ <span id="h-lives">5</span></div>
    <div id="timer-box" class="stat-box" style="background:#000; color:#0f0">⏳ <span id="h-timer">01:00</span></div>
    <div id="name-box" class="stat-box hidden" style="background:var(--blue); color:#fff">👤 <span id="h-name">Non</span></div>
    <div class="stat-box" style="background:var(--yellow)">⭐ <span id="h-lvl">1</span></div>
    <div class="stat-box">🪙 <span id="h-coins">0</span></div>
    <div class="stat-box" style="border-color:#2ecc71">💵 <span id="h-cash">0</span></div>
</div>

<canvas id="g"></canvas>

<script>
const SB_URL = "https://ctnuuvdakmqpbuzhrsos.supabase.co";
const SB_KEY = "sb_publishable_1FObDLbOBvb3CBqfCOOQkw_2p6v1ObQ";
const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

window.user = { email: '', coins: 1000, cash: 100, level: 1, lives: 5, current: '🥷', isGuest: true };

const Auth = {
    playAsGuest() {
        window.user.isGuest = true;
        this.finishAuth();
    },
    async signUp() {
        const email = document.getElementById('u-email').value;
        const password = document.getElementById('u-pass').value;
        const { error } = await supabaseClient.auth.signUp({ 
            email, password, 
            options: { emailRedirectTo: window.location.href.split('index.html')[0] + "phone-auth.html" } 
        });
        if (error) alert(error.message); else alert("افحص إيميلك الآن!");
    },
    async signIn() {
        const email = document.getElementById('u-email').value;
        const password = document.getElementById('u-pass').value;
        const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
        if (error) alert(error.message); else this.loadCloudData(data.user.email);
    },
    async signInByPhone() {
        const phone = prompt("أدخل رقم الهاتف:");
        const pin = prompt("أدخل كود الـ PIN:");
        if(!phone || !pin) return;
        const { data, error } = await supabaseClient.from('players').select('*').eq('phone', phone).eq('pin_code', pin).single();
        if (data) {
            window.user = { ...window.user, ...data, isGuest: false };
            this.finishAuth();
        } else alert("الرقم أو الـ PIN غير صحيح!");
    },
    async loadCloudData(email) {
        let { data } = await supabaseClient.from('players').select('*').eq('email', email).single();
        if (!data) {
            const { data: newUser } = await supabaseClient.from('players').insert([{ email, coins:1000, cash:100, level:1, current:'🥷' }]).select().single();
            data = newUser;
        }
        window.user = { ...window.user, ...data, isGuest: false };
        this.finishAuth();
    },
    finishAuth() {
        const name = window.user.isGuest ? "Guest" : window.user.email.split('@')[0];
        document.getElementById('h-name').innerText = name;
        document.getElementById('h-coins').innerText = window.user.coins;
        document.getElementById('h-cash').innerText = window.user.cash;
        document.getElementById('h-lvl').innerText = window.user.level;
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('hud').classList.remove('hidden');
        if(!App.active) App.init();
    }
};

const App = {
    canvas: document.getElementById('g'), ctx: null, active: false,
    pX: 0, pY: 0, tX: 0, tY: 0, monsters: [], bullets: [], gems: [],
    gameTime: 60, portal: { active: false, x:0, y:0 },

    init() {
        this.ctx = this.canvas.getContext('2d'); this.resize();
        this.pX = this.tX = this.canvas.width/2; this.pY = this.tY = this.canvas.height/2;
        this.active = true; this.loop();
    },
    resize() { this.canvas.width = window.innerWidth; this.canvas.height = window.innerHeight; },
    async save() {
        if (window.user.isGuest) return;
        // تحديث البيانات بناءً على أسماء الأعمدة في صورتك
        await supabaseClient.from('players').update({ 
            coins: window.user.coins, 
            cash: window.user.cash, 
            level: window.user.level 
        }).eq('email', window.user.email);
    },
    loop() {
        if(!this.active) return;
        this.ctx.clearRect(0,0,this.canvas.width, this.canvas.height);
        this.pX += (this.tX - this.pX) * 0.15; this.pY += (this.tY - this.pY) * 0.15;
        this.ctx.font = "40px Arial";
        this.ctx.fillText(window.user.current, this.pX-20, this.pY+15);
        requestAnimationFrame(()=>this.loop());
    }
};

window.addEventListener('mousemove', (e) => { App.tX = e.clientX; App.tY = e.clientY; });
window.addEventListener('touchmove', (e) => { e.preventDefault(); App.tX = e.touches[0].clientX; App.tY = e.touches[0].clientY; }, {passive: false});
window.addEventListener('resize', () => App.resize());
</script>
</body>
</html>
