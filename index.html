<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE LAST OPERATOR - FINAL PRO</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --blue: #00d2ff; --pink: #ff4081; --yellow: #ffeb3b; --whatsapp: #25D366; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background: linear-gradient(180deg, #6a5af9 0%, #d66efd 100%); color: #fff; width: 100vw; height: 100vh; overflow: hidden; touch-action: none; }
        #flash-overlay { position: fixed; inset: 0; background: #fff; opacity: 0; pointer-events: none; z-index: 2000; transition: opacity 0.2s; }
        .screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 500; padding: 15px; }
        .hidden { display: none !important; }
        .auth-container { background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(15px); padding: 30px; border-radius: 40px; border: 3px solid #fff; width: 100%; max-width: 420px; text-align: center; }
        .auth-input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 50px; border: none; text-align: center; font-size: 1.1rem; font-weight: bold; color: #333; }
        .btn-entry { width: 100%; padding: 12px; margin: 8px 0; border-radius: 50px; border: none; font-size: 1.1rem; font-weight: bold; cursor: pointer; }
        .btn-supabase { background: #3ecf8e; color: white; }
        .btn-guest { background: var(--pink); color: white; }
        #hud { position: fixed; top: 10px; width: 100%; display: flex; justify-content: center; gap: 8px; z-index: 100; pointer-events: none; }
        .stat-box { background: #fff; color: #333; padding: 5px 12px; border-radius: 12px; font-weight: bold; font-size: 0.8rem; border: 2px solid #9c27b0; pointer-events: auto; }
        .market-card { background: #fff; color: #333; padding: 20px; border-radius: 30px; width: 90%; max-width: 400px; max-height: 85vh; display: flex; flex-direction: column; }
        .market-content { overflow-y: auto; flex-grow: 1; padding: 10px 5px; }
        .wallet-bar { background: #eee; padding: 10px; border-radius: 50px; margin-bottom: 15px; display: flex; justify-content: space-around; font-weight: bold; }
        .item-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; }
        .skin-item { border: 2px solid #ddd; padding: 10px; border-radius: 15px; cursor: pointer; display: flex; flex-direction: column; align-items: center; }
        .skin-item.active { border-color: var(--pink); background: #ffe4ee; }
        canvas { display: block; width: 100%; height: 100%; }
    </style>
</head>
<body>

<div id="flash-overlay"></div>

<div id="auth-screen" class="screen">
    <h1 style="font-size: 2.5rem; text-shadow: 2px 2px #ff4081; margin-bottom: 20px;">🌟 البطل الأخير 🌟</h1>
    <div class="auth-container">
        <input type="email" id="u-email" class="auth-input" placeholder="البريد الإلكتروني">
        <input type="password" id="u-pass" class="auth-input" placeholder="كلمة المرور">
        <div style="display: flex; gap: 10px;">
            <button class="btn-entry btn-supabase" onclick="AuthManager.handleSupabase('login')">دخول</button>
            <button class="btn-entry btn-supabase" style="background:#2b2b2b" onclick="AuthManager.handleSupabase('signup')">تسجيل</button>
        </div>
        <hr style="margin: 15px 0; opacity: 0.3;">
        <button class="btn-entry btn-guest" onclick="AuthManager.startGuest()">لعب كضيف (أوفلاين)</button>
    </div>
</div>

<div id="s-market" class="screen hidden">
    <div class="market-card">
        <h2 style="color: #9c27b0; text-align: center; margin-bottom: 10px;">🎁 متجر الألعاب</h2>
        <div class="market-content">
            <div class="wallet-bar">
                <span>🪙 <b id="m-gold">0</b></span> | <span>💵 <b id="m-pegy">0</b></span>
            </div>
            <button class="btn-entry" style="background: var(--yellow); color: #333;" onclick="Market.convertCurrency()">🔄 استبدال 1000🪙 ➔ 50💵</button>
            <button class="btn-entry" style="background: var(--pink); color: #fff;" onclick="Market.buyUpgrade()">🔥 تطوير السلاح (100💵)</button>
            <div class="item-grid" id="skin-grid"></div>
            <button class="btn-entry" style="background: #25D366; color: white;" onclick="window.open('01287837118')">💬 تواصل واتساب</button>
        </div>
        <button class="btn-entry" style="background: var(--pink); color: #fff; margin-top:10px;" onclick="Market.close()">إغلاق ❌</button>
    </div>
</div>

<div id="hud" class="hidden">
    <div class="stat-box" onclick="Market.open()" style="background:var(--blue); cursor:pointer;">المتجر 🛒</div>
    <div class="stat-box">❤️ <span id="h-lives">5</span></div>
    <div id="timer-box" class="stat-box" style="background:#000; color:#0f0">⏳ <span id="h-timer">20</span></div>
    <div class="stat-box">⭐ <span id="h-lvl">1</span></div>
    <div class="stat-box">🪙 <span id="h-coins">0</span></div>
    <div class="stat-box" style="border-color:#2ecc71">💵 <span id="h-cash">0</span></div>
</div>

<canvas id="g"></canvas>

<script>
const SB_URL = "https://ctnuuvdakmqpbuzhrsos.supabase.co";
const SB_KEY = "sb_publishable_1FObDLbOBvb3CBqfCOOQkw_2p6v1ObQ";
const sb = supabase.createClient(SB_URL, SB_KEY);

const AudioEngine = {
    ctx: null,
    init() { if(!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
    play(freq, type, duration) {
        this.init();
        if(this.ctx.state === 'suspended') this.ctx.resume();
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
        gain.gain.setValueAtTime(0.05, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        osc.start();
        osc.stop(this.ctx.currentTime + duration);
    },
    shoot() { this.play(900, 'square', 0.05); },
    btn() { this.play(500, 'sine', 0.05); },
    portal() { this.play(150, 'sawtooth', 0.4); }
};

window.user = { coins: 0, cash: 0, level: 1, lives: 5, fireRate: 350, currentSkin: '🥷', unlockedSkins: ['🥷'] };
const skinData = [{icon:'🥷',p:0,t:'free'},{icon:'🤖',p:5000,t:'coins'},{icon:'🧙‍♂️',p:50,t:'cash'},{icon:'🦖',p:100,t:'cash'},{icon:'👽',p:200,t:'cash'}];

const App = {
    canvas: document.getElementById('g'), ctx: null, active: false, pX: 0, pY: 0, tX: 0, tY: 0, 
    monsters: [], bullets: [], gems: [], gameTime: 20, lastShot: 0, 
    portalActive: false, porX: 0, porY: 0,

    init() { this.ctx = this.canvas.getContext('2d'); this.resize(); this.pX = this.tX = innerWidth/2; this.pY = this.tY = innerHeight/2; this.active = true; this.loop(); },
    resize() { this.canvas.width = window.innerWidth; this.canvas.height = window.innerHeight; },
    updateHUD() { 
        document.getElementById('h-coins').innerText = window.user.coins; 
        document.getElementById('h-cash').innerText = window.user.cash; 
        document.getElementById('h-lvl').innerText = window.user.level; 
        document.getElementById('h-lives').innerText = window.user.lives; 
    },
    spawnMonster() {
        // يسمح بظهور الوحوش فقط إذا لم تكن البوابة نشطة
        if(this.portalActive) return;
        let x, y, side = Math.floor(Math.random()*4);
        if(side===0){x=Math.random()*innerWidth;y=-30;} else if(side===1){x=innerWidth+30;y=Math.random()*innerHeight;}
        else if(side===2){x=Math.random()*innerWidth;y=innerHeight+30;} else {x=-30;y=Math.random()*innerHeight;}
        this.monsters.push({x, y, spd: 0.8+(window.user.level*0.2)});
    },
    triggerPortal() {
        if(!this.portalActive) {
            this.portalActive = true;
            this.monsters = []; // حذف الوحوش فور ظهور البوابة لزيادة التركيز
            this.porX = 50 + Math.random() * (innerWidth - 100);
            this.porY = 100 + Math.random() * (innerHeight - 200);
        }
    },
    update() {
        if(!this.active || !document.getElementById('s-market').classList.contains('hidden')) return;

        // منطق البوابة
        if(window.user.level === 1) {
            document.getElementById('timer-box').classList.remove('hidden');
            if(this.gameTime > 0) {
                this.gameTime -= 5/60; 
                document.getElementById('h-timer').innerText = Math.ceil(this.gameTime);
            } else { this.triggerPortal(); }
        } else {
            document.getElementById('timer-box').classList.add('hidden');
            // تظهر البوابة كلما وصل رصيد العملات في هذا المستوى لـ 1000 أو أكثر
            if(window.user.coins >= 1000) { this.triggerPortal(); }
        }

        this.pX += (this.tX-this.pX)*0.15; this.pY += (this.tY-this.pY)*0.15;
        
        // ظهور الوحوش
        if(!this.portalActive && Math.random() < 0.05) this.spawnMonster();

        this.monsters.forEach((m,i)=>{
            let ang=Math.atan2(this.pY-m.y,this.pX-m.x); m.x+=Math.cos(ang)*m.spd; m.y+=Math.sin(ang)*m.spd;
            if(Math.hypot(this.pX-m.x,this.pY-m.y)<25){
                window.user.lives--; this.updateHUD(); this.monsters.splice(i,1);
                if(window.user.lives<=0) location.reload();
            }
        });

        // السلاح
        if(window.user.level>=2 && !this.portalActive && Date.now()-this.lastShot > window.user.fireRate){
            AudioEngine.shoot();
            this.bullets.push({x:this.pX,y:this.pY,vx:14,vy:0},{x:this.pX,y:this.pY,vx:-14,vy:0});
            this.lastShot=Date.now();
        }

        this.bullets.forEach((b,bi)=>{
            b.x+=b.vx; 
            this.monsters.forEach((m,mi)=>{
                if(Math.hypot(b.x-m.x,b.y-m.y)<35){
                    if(Math.random()<0.08) this.gems.push({x:m.x,y:m.y});
                    this.monsters.splice(mi,1); window.user.coins += 50; 
                    this.bullets.splice(bi,1); this.updateHUD();
                }
            });
            if(b.x < -50 || b.x > innerWidth+50) this.bullets.splice(bi, 1);
        });

        this.gems.forEach((g,i)=>{if(Math.hypot(this.pX-g.x,this.pY-g.y)<40){window.user.cash+=2;this.gems.splice(i,1);this.updateHUD();}});

        // الانتقال الفعلي
        if(this.portalActive && Math.hypot(this.pX-this.porX, this.pY-this.porY) < 70){
            AudioEngine.portal();
            window.user.level++;
            
            // --- السطر السحري لحل مشكلتك ---
            this.portalActive = false; // نغلق البوابة فوراً للسماح للوحوش بالظهور
            window.user.coins = 0;    // نصفر العملات ليبدأ تجميع 1000 جديدة للمستوى القادم
            
            this.monsters = []; this.bullets = []; this.gems = [];
            this.gameTime = 20; 
            this.updateHUD();
            document.getElementById('flash-overlay').style.opacity='1'; 
            setTimeout(()=>document.getElementById('flash-overlay').style.opacity='0',300);
        }
    },
    draw() {
        this.ctx.clearRect(0,0,innerWidth,innerHeight);
        if(this.portalActive){
            this.ctx.font="100px Arial"; this.ctx.textAlign="center";
            this.ctx.fillText("🌀",this.porX,this.porY+30);
        }
        this.ctx.font="45px Arial"; this.ctx.textAlign="center";
        this.ctx.fillText(window.user.currentSkin,this.pX,this.pY+15);
        this.monsters.forEach(m=>{this.ctx.fillText("🐞",m.x,m.y+10);});
        this.bullets.forEach(b=>{this.ctx.font="20px Arial";this.ctx.fillText("⚡",b.x,b.y+7);});
        this.gems.forEach(g=>{this.ctx.font="30px Arial";this.ctx.fillText("💎",g.x,g.y+10);});
    },
    loop() { if(this.active){this.update();this.draw();requestAnimationFrame(()=>this.loop());} }
};

const AuthManager = {
    async handleSupabase(type) {
        AudioEngine.btn();
        const email = document.getElementById('u-email').value;
        const pass = document.getElementById('u-pass').value;
        if(!email || !pass) return alert("أدخل البيانات");
        try {
            let res = (type === 'signup') ? await sb.auth.signUp({email, password:pass}) : await sb.auth.signInWithPassword({email, password:pass});
            if(res.error) throw res.error;
            if(type === 'login') this.launch();
            else alert("تم التسجيل! فعل حسابك من الإيميل.");
        } catch(e) { alert(e.message); }
    },
    startGuest() { AudioEngine.btn(); this.launch(); },
    launch() {
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('hud').classList.remove('hidden');
        App.init();
    }
};

const Market = {
    open() { 
        AudioEngine.btn();
        document.getElementById('m-gold').innerText = window.user.coins; 
        document.getElementById('m-pegy').innerText = window.user.cash; 
        this.renderSkins(); 
        document.getElementById('s-market').classList.remove('hidden'); 
    },
    close() { AudioEngine.btn(); document.getElementById('s-market').classList.add('hidden'); },
    renderSkins() {
        const grid = document.getElementById('skin-grid'); grid.innerHTML = '';
        skinData.forEach(s => {
            const isUnlocked = window.user.unlockedSkins.includes(s.icon);
            const div = document.createElement('div');
            div.className = `skin-item ${window.user.currentSkin === s.icon ? 'active' : ''}`;
            div.innerHTML = `<span style="font-size:25px">${s.icon}</span><span style="font-size:10px; font-weight:bold">${isUnlocked?'فتح':(s.t==='coins'?s.p+'🪙':s.p+'💵')}</span>`;
            div.onclick = () => { AudioEngine.btn(); if(isUnlocked) window.user.currentSkin=s.icon; else this.buySkin(s); this.renderSkins(); App.updateHUD(); };
            grid.appendChild(div);
        });
    },
    buySkin(s) {
        let p = (s.t==='coins')?window.user.coins:window.user.cash;
        if(p>=s.p){ if(s.t==='coins') window.user.coins-=s.p; else window.user.cash-=s.p; window.user.unlockedSkins.push(s.icon); window.user.currentSkin=s.icon; }
        else alert("رصيد غير كافٍ");
    },
    convertCurrency() { AudioEngine.btn(); if(window.user.coins>=1000){window.user.coins-=1000;window.user.cash+=50;this.open();App.updateHUD();} },
    buyUpgrade() { AudioEngine.btn(); if(window.user.cash>=100){window.user.cash-=100;window.user.fireRate=Math.max(100,window.user.fireRate-50);this.open();App.updateHUD();} }
};

window.addEventListener('mousemove',(e)=>{App.tX=e.clientX;App.tY=e.clientY;});
window.addEventListener('touchmove',(e)=>{e.preventDefault();App.tX=e.touches[0].clientX;App.tY=e.touches[0].clientY;},{passive:false});
window.addEventListener('resize',()=>App.resize());
</script>
</body>
                                                                                                              </html>
