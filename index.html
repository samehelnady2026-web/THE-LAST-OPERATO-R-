<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE LAST OPERATOR | PRO</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00f2ff">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="auth-screen" class="screen">
        <h1 class="neon-text">THE LAST OPERATOR</h1>
        <div class="glass-card">
            <input type="text" id="u-name" class="input-box" placeholder="اسم المقاتل">
            <input type="tel" id="u-phone" class="input-box" placeholder="رقم الهاتف">
            <input type="email" id="u-email" class="input-box" placeholder="البريد الإلكتروني">
            <button class="btn-buy" onclick="GameEngine.start(true)">تسجيل دخول (أونلاين)</button>
            <button class="btn-buy btn-outline" onclick="GameEngine.start(false)">دخول سريع (أوفلاين)</button>
        </div>
    </div>

    <div id="s-market" class="screen hidden">
        <h2 class="neon-text">المتجر الأسود</h2>
        
        <div class="wallet-bar">
            <span>🪙 <b id="m-gold">0</b></span> | <span>💷 <b id="m-pegy">0</b></span>
        </div>
        
        <div class="glass-card scrollable">
            <button id="install-btn" class="btn-buy" style="display:none; background: #ffcc00; margin-bottom: 15px; border: 2px solid #fff; color: #000;">
                📥 تحميل اللعبة على الهاتف (مهم)
            </button>

            <div class="exchange-section">
                <button onclick="Market.exchange('GtoP')">استبدال 10000🪙 بـ 10💷</button>
                <button onclick="Market.exchange('PtoG')">استبدال 10💷 بـ 10000🪙</button>
            </div>
            
            <div class="upgrades-section">
                <button onclick="Market.buyUpgrade('speed', 50)">⚡ مسرع الطلقات (50💷)</button>
                <button onclick="Market.buyUpgrade('density', 100)">🔥 كثافة الطلقات (100💷)</button>
            </div>

            <div class="item-grid" id="skin-grid"></div>
            <button class="btn-buy start-btn" onclick="GameEngine.initLevel()">بدء المهمة ⚔️</button>
        </div>
    </div>

    <div id="hud" class="hidden">
        <div class="stat-box"><span class="floating-icon">💜</span><span id="h-lives">5</span></div>
        <div class="stat-box" id="status-box"><span class="floating-icon">⏳</span><span id="timer-val">00:00</span></div>
        <div class="level-container"><div class="level-label">LEVEL</div><div id="level-num">1</div></div>
        <div class="stat-box"><span class="floating-icon">💷</span><span id="h-pegy">0</span></div>
        <div class="stat-box"><span class="floating-icon">🪙</span><span id="h-gold">0</span></div>
    </div>

    <canvas id="g"></canvas>

    <script src="game.js"></script>
</body>
</html>
