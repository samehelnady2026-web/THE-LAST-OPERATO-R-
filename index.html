<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE LAST OPERATOR - ULTIMATE</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>
    <style>
        :root { --blue: #00d2ff; --pink: #ff4081; --gold: #ffeb3b; --bg: #050508; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: #fff; overflow: hidden; touch-action: none; }
        
        /* واجهة HUD */
        #hud { position: fixed; top: 10px; width: 100%; display: flex; justify-content: center; gap: 10px; z-index: 100; pointer-events: none; }
        .stat-box { background: rgba(255,255,255,0.1); backdrop-filter: blur(8px); padding: 8px 15px; border-radius: 12px; border: 1px solid var(--blue); font-weight: bold; pointer-events: auto; }

        /* الشاشات */
        .screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; background: rgba(0,0,0,0.9); padding: 20px; }
        .hidden { display: none !important; }
        
        /* المتجر وتطوير الشخصيات */
        .market-card { background: #1a1a2e; border: 2px solid var(--blue); padding: 20px; border-radius: 25px; width: 100%; max-width: 500px; max-height: 85vh; overflow-y: auto; }
        .char-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .char-item { background: #16213e; border: 2px solid #333; padding: 15px; border-radius: 15px; text-align: center; cursor: pointer; transition: 0.3s; }
        .char-item.active { border-color: var(--pink); box-shadow: 0 0 15px var(--pink); }
        .char-item img { width: 60px; height: 60px; margin-bottom: 10px; }
        
        .btn { width: 100%; padding: 12px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-play { background: var(--blue); color: #000; font-size: 1.2rem; }
        
        canvas { display: block; }
    </style>
</head>
<body>

<div id="hud" class="hidden">
    <div class="stat-box" onclick="location.reload()">🏠 الرئيسية</div>
    <div class="stat-box">❤️ <span id="h-lives">0</span></div>
    <div class="stat-box" style="color:var(--gold)">🪙 <span id="h-coins">0</span></div>
    <div class="stat-box" style="color:var(--pink)">⭐ <span id="h-lvl">1</span></div>
</div>

<div id="start-screen" class="screen">
    <img src="Icon.png" width="80" style="margin-bottom: 15px;">
    <h1 style="color: var(--blue); text-shadow: 0 0 10px var(--blue);">THE LAST OPERATOR</h1>
    <div class="market-card">
        <h3 style="text-align:center;">اختر فئة المشغل</h3>
        <div class="char-grid" id="char-list"></div>
        <button class="btn btn-play" onclick="App.launch()">دخول السيرفر 🚀</button>
    </div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
// --- الربط مع Supabase (باستخدام بياناتك الأصلية) ---
const sb = supabase.createClient("https://ctnuuvdakmqpbuzhrsos.supabase.co", "sb_publishable_1FObDLbOBvb3CBqfCOOQkw_2p6v1ObQ");

// --- أصوات اللعبة ---
const SFX = {
    shoot: new Howl({ src: ['https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3'], volume: 0.2 }),
    death: new Howl({ src: ['https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3'] })
};

// --- تعريف الشخصيات والقدرات ---
const HEROES = {
    'Ninja': { name: "النينجا", img: "https://img.icons8.com/plasticine/100/ninja.png", speed: 6, fireRate: 300, power: 1, hp: 3 },
    'Tank': { name: "المدرع", img: "https://img.icons8.com/plasticine/100/bot.png", speed: 2.5, fireRate: 150, power: 2, hp: 10 },
    'Mage': { name: "المهندس", img: "https://img.icons8.com/plasticine/100/wizard.png", speed: 4, fireRate: 400, power: 5, hp: 4 }
};

window.user = { coins: 0, level: 1, selected: 'Ninja' };

const App = {
    canvas: document.getElementById('gameCanvas'), ctx: null, active: false,
    pX: 0, pY: 0, tX: 0, tY: 0, monsters: [], bullets: [], lastShot: 0, bossActive: false,

    init() {
        this.ctx = this.canvas.getContext('2d');
        this.resize();
        window.addEventListener('resize', () => this.resize());
        this.canvas.addEventListener('mousemove', e => { this.tX = e.clientX; this.tY = e.clientY; });
        this.canvas.addEventListener('touchmove', e => { this.tX = e.touches[0].clientX; this.tY = e.touches[0].clientY; });
    },

    resize() { this.canvas.width = window.innerWidth; this.canvas.height = window.innerHeight; },

    launch() {
        const h = HEROES[window.user.selected];
        this.playerHp = h.hp;
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('hud').classList.remove('hidden');
        this.pX = innerWidth/2; this.pY = innerHeight/2;
        this.active = true;
        this.loop();
        setInterval(() => this.spawnMonster(), 1200);
    },

    spawnMonster() {
        if(!this.active) return;
        const isBoss = Math.random() > 0.9 && !this.bossActive;
        this.monsters.push({
            x: Math.random() * innerWidth, y: -50,
            spd: isBoss ? 0.5 : 1 + (window.user.level * 0.2),
            hp: isBoss ? 20 : 1, isBoss,
            img: isBoss ? "https://img.icons8.com/plasticine/100/skull.png" : "https://img.icons8.com/plasticine/100/coronavirus.png"
        });
        if(isBoss) this.bossActive = true;
    },

    update() {
        const h = HEROES[window.user.selected];
        this.pX += (this.tX - this.pX) * 0.1;
        this.pY += (this.tY - this.pY) * 0.1;

        if(Date.now() - this.lastShot > h.fireRate) {
            this.bullets.push({ x: this.pX, y: this.pY - 20 });
            this.lastShot = Date.now();
            SFX.shoot.play();
        }

        this.monsters.forEach((m, mi) => {
            m.y += m.spd;
            if(Math.hypot(this.pX - m.x, this.pY - m.y) < 40) {
                this.playerHp--;
                this.monsters.splice(mi, 1);
                if(this.playerHp <= 0) location.reload();
            }
        });

        this.bullets.forEach((b, bi) => {
            b.y -= 10;
            this.monsters.forEach((m, mi) => {
                if(Math.hypot(b.x - m.x, b.y - m.y) < 40) {
                    m.hp -= h.power;
                    this.bullets.splice(bi, 1);
                    if(m.hp <= 0) {
                        if(m.isBoss) { this.bossActive = false; window.user.level++; }
                        window.user.coins += 100;
                        this.monsters.splice(mi, 1);
                    }
                }
            });
        });
        this.updateHUD();
    },

    draw() {
        this.ctx.clearRect(0,0,innerWidth,innerHeight);
        const pImg = new Image(); pImg.src = HEROES[window.user.selected].img;
        this.ctx.drawImage(pImg, this.pX - 40, this.pY - 40, 80, 80);

        this.monsters.forEach(m => {
            const mImg = new Image(); mImg.src = m.img;
            let s = m.isBoss ? 100 : 50;
            this.ctx.drawImage(mImg, m.x - s/2, m.y - s/2, s, s);
        });

        this.ctx.fillStyle = "#00d2ff";
        this.bullets.forEach(b => this.ctx.fillRect(b.x-2, b.y, 4, 15));
    },

    loop() { if(this.active){ this.update(); this.draw(); requestAnimationFrame(()=>this.loop()); } },
    updateHUD() {
        document.getElementById('h-coins').innerText = window.user.coins;
        document.getElementById('h-lives').innerText = this.playerHp;
        document.getElementById('h-lvl').innerText = window.user.level;
    }
};

const UI = {
    init() {
        const list = document.getElementById('char-list');
        Object.keys(HEROES).forEach(key => {
            const h = HEROES[key];
            const div = document.createElement('div');
            div.className = `char-item ${window.user.selected === key ? 'active' : ''}`;
            div.innerHTML = `<img src="${h.img}"><p>${h.name}</p><small>❤️${h.hp} 🔥${h.power}</small>`;
            div.onclick = () => { window.user.selected = key; this.init(); };
            list.appendChild(div);
        });
    }
};

App.init();
UI.init();
</script>
</body>
</html>
