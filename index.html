<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #game-ui { text-align: center; }
        .btn { padding: 15px 30px; margin: 10px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
        #installBtn { background: #2ed573; display: none; }
    </style>
</head>
<body>

<div id="game-ui">
    <h1>THE LAST OPERATOR</h1>
    <div id="status">جاري الاتصال بالسيرفر...</div>
    <button id="installBtn" class="btn">📥 تثبيت اللعبة</button>
</div>

<script>
    // 1. الإعدادات الخاصة بك
    const SUPABASE_URL = 'https://arntndfgzfxnbvttzjzj.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFybnRuZGZnemZ4bmJ2dHR6anpqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxNTgwNjMsImV4cCI6MjA5NzczNDA2M30.RvOPtVjDgExgWCnAAIclGueOU7A0_3wwXa2L_9rg_Zc';
    const TELEGRAM_ID = '-1003614080639';
    
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 2. دالة تحديث البيانات لحظياً (تمنع ضياع الرصيد)
    async function updatePlayerData(appId, newData) {
        const { data, error } = await supabase
            .from('players')
            .update(newData)
            .eq('appId', appId);
        
        if (error) console.error("خطأ في المزامنة:", error);
        else console.log("تم حفظ بياناتك بنجاح في Supabase");
    }

    // 3. منطق PWA (التثبيت)
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById('installBtn').style.display = 'block';
    });

    document.getElementById('installBtn').onclick = () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then((choice) => {
                if (choice.outcome === 'accepted') document.getElementById('installBtn').style.display = 'none';
            });
        }
    };

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').then(() => console.log('SW Registered'));
    }

    // تجربة الاتصال
    console.log("تم تهيئة التطبيق بنجاح مع Telegram ID:", TELEGRAM_ID);
    document.getElementById('status').innerText = "تم الاتصال بالسيرفر جاهز للعب";
</script>
</body>
