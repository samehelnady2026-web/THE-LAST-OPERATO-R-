<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE LAST OPERATOR - ULTRA CLOUD</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --blue: #00d2ff; --pink: #ff4081; --yellow: #ffeb3b; --glass: rgba(255, 255, 255, 0.2); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Arial', sans-serif; }
        body { background: #050505; color: #fff; width: 100vw; height: 100vh; overflow: hidden; touch-action: none; }
        .screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, #1a1a2e 0%, #050505 100%); z-index: 200; }
        .hidden { display: none !important; }
        .glass-card { background: var(--glass); backdrop-filter: blur(15px); padding: 25px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.3); text-align: center; width: 90%; max-width: 400px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 12px; border: none; text-align: center; background: #fff; }
        button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-blue { background: var(--blue); color: #000; }
        .btn-pink { background: var(--pink); color: #fff; }
        #hud { position: fixed; top: 10px; width: 100%; display: flex; justify-content: center; gap: 5px; z-index: 100; pointer-events: none; }
        .stat-box { background: #fff; color: #333; padding: 5px 10px; border-radius: 12px; font-weight: bold; font-size: 0.8rem; min-width: 65px; text-align: center; border: 2px solid #9c27b0; }
        canvas { display: block; }
        #flash-effect { position: fixed; inset: 0; background: white; opacity: 0; pointer-events: none; z-index: 300; }
    </style>
</head>
<body>

<div id="flash-effect"></div>

<div id="auth-screen" class="screen">
    <div class="glass-card">
        <h1 style="color:var(--yellow)">THE LAST OPERATOR</h1>
        <input type="email" id="u-email" placeholder="البريد الإلكتروني">
        <input type="password" id="u-pass" placeholder="كلمة المرور">
        <button class="btn-blue" onclick="Auth.signUp()">تسجيل حساب جديد 📧</button>
        <button class="btn-pink" onclick="Auth.signIn()">دخول بالإيميل 🔑</button>
        <hr style="margin:15px; opacity:0.3">
        <button style="background:#2ecc71; color:white;" onclick="Auth.signInByPhone()">دخول سريع بالهاتف 📱</button>
    </div>
</div>

<div id="hud" class="hidden">
    <div class="stat-box">❤️ <span id="h-lives">5</span></div>
    <div id="timer-box" class="stat-box" style="background:#000; color:#0f0">⏳ <span id="h-timer">01:00</span></div>
    <div id="name-box" class="stat-box hidden" style="background:var(--blue); color:#fff">👤 <span id="h-name">Non</span></div>
    <div class="stat-box" style="background:var(--yellow)">⭐ <span id="h-lvl">1</span></div>
    <div class="stat-box">🪙 <span id="h-coins">0</span></div>
    <div class="stat-box" style="border-color:#2ecc71">💵 <span id="h-cash">0</span></div>
</div>

<canvas id="g"></canvas>

<script>
// --- إعدادات Supabase (استبدل ببياناتك) ---
const SB_URL = "https://your-project.supabase.co";
const SB_KEY = "your-anon-key";
const supabase = supabase.createClient(SB_URL, SB_KEY);

const Sound = {
    ctx: new (window.AudioContext || window.webkitAudioContext)(),
    play(f, t, d, v=0.1) {
        try { if(this.ctx.state==='suspended')this.ctx.resume();
        const o=this.ctx.createOscillator(), g=this.ctx.createGain();
        o.type=t; o.frequency.setValueAtTime(f,this.ctx.currentTime);
        g.gain.setValueAtTime(v,this.ctx.currentTime);
        o.connect(g); g.connect(this.ctx.destination);
        o.start(); o.stop(this.ctx.currentTime+d); } catch(e){}
    },
    shoot() { this.play(600, 'square', 0.05); },
    explode() { this.play(80, 'sawtooth', 0.2, 0.2); },
    gem() { this.play(1200, 'sine', 0.3, 0.2); }
};

window.user = { email: '', coins: 1000, cash: 100, level: 1, lives: 5, current: '🥷', phone: '' };

const Auth = {
    async signUp() {
        const email = document.getElementById('u-email').value;
        const password = document.getElementById('u-pass').value;
        const { error } = await supabase.auth.signUp({ email, password });
        if (error) alert(error.message);
        else alert("تم إرسال رابط التفعيل لإيميلك! افحص بريدك لتفعيل الدخول بالهاتف.");
    },
    async signIn() {
        const email = document.getElementById('u-email').value;
        const password = document.getElementById('u-pass').value;
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) alert(error.message);
        else this.loadData(data.user.email);
    },
    async signInByPhone() {
        const phone = prompt("أدخل رقم هاتفك المسجل:");
        if(!phone) return;
        const { data, error } = await supabase.from('players').select('email').eq('phone', phone).single();
        if (data) {
            const pass = prompt("أدخل كلمة المرور:");
            const { error: logErr } = await supabase.auth.signInWithPassword({ email: data.email, password: pass });
            if (!logErr) this.loadData(data.email);
            else alert("بيانات خاطئة");
        } else alert("الهاتف غير مربوط بحساب");
    },
    async loadData(email) {
        let { data } = await supabase.from('players').select('*').eq('email', email).single();
        if (!data) {
            const { data: newUser } = await supabase.from('players').insert([{ email, coins:1000, cash:100, level:1 }]).select().single();
            data = newUser;
        }
        window.user = { ...window.user, ...data };
        document.getElementById('h-name').innerText = window.user.email.split('@')[0];
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('hud').classList.remove('hidden');
        App.init();
    }
};

const App = {
    canvas: document.getElementById('g'), ctx: null, active: false,
    pX: 0, pY: 0, tX: 0, tY: 0, monsters: [], bullets: [], gems: [], explosions: [],
    gameTime: 60, lastShot: 0, portal: { active: false, x:0, y:0, vx:2, vy:2 },

    init() {
        this.ctx = this.canvas.getContext('2d');
        this.resize();
        this.pX = this.tX = this.canvas.width/2;
        this.pY = this.tY = this.canvas.height/2;
        this.active = true;
        this.loop();
    },
    resize() { this.canvas.width = window.innerWidth; this.canvas.height = window.innerHeight; },
    async save() {
        await supabase.from('players').update({ 
            coins: window.user.coins, cash: window.user.cash, level: window.user.level 
        }).eq('email', window.user.email);
    },
    resetLevel() {
        window.user.level++;
        this.gameTime = 60; this.monsters = []; this.bullets = []; this.gems = [];
        this.portal.active = false; this.portal.x = 0;
        document.getElementById('h-lvl').innerText = window.user.level;
        if(window.user.level >= 2) {
            document.getElementById('timer-box').classList.add('hidden');
            document.getElementById('name-box').classList.remove('hidden');
        }
        this.save();
    },
    addExplosion(x, y, color) { this.explosions.push({x, y, color, r: 10, alpha: 1}); },

    updateLogic() {
        if (this.gameTime > 0) this.gameTime -= 0.133; else this.portal.active = true;
        document.getElementById('h-timer').innerText = `00:${Math.max(0, Math.ceil(this.gameTime)).toString().padStart(2,'0')}`;
        
        this.pX += (this.tX - this.pX) * 0.15;
        this.pY += (this.tY - this.pY) * 0.15;

        if(window.user.level >= 2 && !this.portal.active && Date.now() - this.lastShot > 350) {
            this.bullets.push({x: this.pX, y: this.pY, vx: 12}, {x: this.pX, y: this.pY, vx: -12});
            this.lastShot = Date.now(); Sound.shoot();
        }
        this.bullets.forEach((b, i) => { b.x += b.vx; if(b.x<0 || b.x>this.canvas.width) this.bullets.splice(i,1); });

        if(!this.portal.active) {
            if(Math.random() < 0.04) {
                let s = Math.floor(Math.random()*4), mx, my;
                if(s==0){mx=Math.random()*this.canvas.width; my=-50}
                else if(s==1){mx=Math.random()*this.canvas.width; my=this.canvas.height+50}
                else if(s==2){mx=-50; my=Math.random()*this.canvas.height}
                else {mx=this.canvas.width+50; my=Math.random()*this.canvas.height}
                this.monsters.push({x: mx, y: my, spd: 1.5 + (window.user.level*0.3)});
            }
        }

        this.monsters.forEach((m, i) => {
            if(!this.portal.active) {
                let ang = Math.atan2(this.pY - m.y, this.pX - m.x);
                m.x += Math.cos(ang)*m.spd; m.y += Math.sin(ang)*m.spd;
            }
            this.bullets.forEach((b, bi) => {
                if(Math.hypot(b.x-m.x, b.y-m.y) < 30) {
                    this.addExplosion(m.x, m.y, "#ff4081");
                    this.monsters.splice(i, 1); this.bullets.splice(bi, 1);
                    window.user.coins += 10; Sound.explode();
                    document.getElementById('h-coins').innerText = window.user.coins;
                }
            });
            if(Math.hypot(this.pX-m.x, this.pY-m.y) < 25) {
                window.user.lives--; document.getElementById('h-lives').innerText = window.user.lives;
                this.monsters.splice(i,1); if(window.user.lives<=0) location.reload();
            }
        });

        if(!this.portal.active && Math.random() < 0.001) this.gems.push({x: Math.random()*this.canvas.width, y: -50});
        this.gems.forEach((g, i) => {
            g.y += 2;
            if(Math.hypot(this.pX-g.x, this.pY-g.y) < 35) {
                this.addExplosion(g.x, g.y, "#ffeb3b");
                window.user.cash += 2; window.user.coins += 50;
                this.gems.splice(i, 1); Sound.gem();
                document.getElementById('h-cash').innerText = window.user.cash;
                document.getElementById('h-coins').innerText = window.user.coins;
            }
        });

        if(this.portal.active) {
            if(this.portal.x === 0) { this.portal.x = this.canvas.width/2; this.portal.y = this.canvas.height/2; }
            this.portal.x += this.portal.vx; this.portal.y += this.portal.vy;
            if(this.portal.x<50 || this.portal.x>this.canvas.width-50) this.portal.vx*=-1;
            if(this.portal.y<50 || this.portal.y>this.canvas.height-50) this.portal.vy*=-1;
            let dist = Math.hypot(this.pX-this.portal.x, this.pY-this.portal.y);
            if(dist < 150) { this.tX += (this.portal.x - this.tX) * 0.1; this.tY += (this.portal.y - this.tY) * 0.1; }
            if(dist < 40) {
                document.getElementById('flash-effect').style.opacity = '1';
                setTimeout(() => { this.resetLevel(); document.getElementById('flash-effect').style.opacity = '0'; }, 400);
            }
        }
    },

    draw() {
        const ctx = this.ctx;
        ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
        this.explosions.forEach((ex, i) => {
            ctx.globalAlpha = ex.alpha; ctx.fillStyle = ex.color;
            ctx.beginPath(); ctx.arc(ex.x, ex.y, ex.r, 0, Math.PI*2); ctx.fill();
            ex.r += 2; ex.alpha -= 0.05; if(ex.alpha <= 0) this.explosions.splice(i, 1);
        });
        ctx.globalAlpha = 1;
        if(this.portal.active) { ctx.font = "70px Arial"; ctx.fillText("🌀", this.portal.x - 35, this.portal.y + 20); }
        ctx.font = "40px Arial"; ctx.fillText(window.user.current, this.pX - 20, this.pY + 15);
        this.bullets.forEach(b => { ctx.font = "20px Arial"; ctx.fillText("⚡", b.x - 10, b.y); });
        this.monsters.forEach(m => { ctx.font = "30px Arial"; ctx.fillText("🐞", m.x - 15, m.y); });
        this.gems.forEach(g => { ctx.font = "35px Arial"; ctx.fillText("💎", g.x - 17, g.y); });
    },

    loop() { if(!this.active) return; this.updateLogic(); this.draw(); requestAnimationFrame(() => this.loop()); }
};

window.addEventListener('mousemove', (e) => { App.tX = e.clientX; App.tY = e.clientY; });
window.addEventListener('touchmove', (e) => { e.preventDefault(); App.tX = e.touches[0].clientX; App.tY = e.touches[0].clientY; }, {passive: false});
window.addEventListener('resize', () => App.resize());
</script>
</body>
    </html>
