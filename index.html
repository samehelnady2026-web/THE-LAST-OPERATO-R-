<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OPERATOR - S - EDITION</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="config.js"></script>
    <script src="game-engine.js"></script>
    <script src="ui-manager.js"></script>
    <script src="main.js"></script>

    <style>
        /* التنسيقات لضمان مظهر احترافي */
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; height: 100vh; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        .screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #111; z-index: 100; }
        .hidden { display: none !important; }
        #authScreen { gap: 15px; padding: 20px; width: 80%; max-width: 300px; text-align: center; }
        input { padding: 12px; border-radius: 8px; border: 1px solid #444; width: 100%; background: #222; color: white; }
        button { padding: 12px; border-radius: 8px; border: none; background: #0984e3; color: white; width: 100%; cursor: pointer; font-weight: bold; }
        #game-container { position: fixed; inset: 0; }
        canvas { display: block; width: 100%; height: 100%; }
        .hud-btn { position: absolute; top: 20px; z-index: 1000; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="authScreen" class="screen">
        <h1>OPERATOR</h1>
        <input type="email" id="authEmail" placeholder="البريد الإلكتروني">
        <input type="password" id="authPass" placeholder="كلمة المرور">
        <button onclick="handleAuth('login')">تسجيل دخول</button>
        <button onclick="loginAsGuest()" style="background:#6c5ce7; margin-top:10px;">دخول كضيف</button>
    </div>

    <div id="game-container" class="hidden">
        <div class="hud-btn" style="right: 20px;" onclick="UIManager.toggleMarket(true)">🛒 السوق</div>
        <div class="hud-btn" style="left: 20px;" onclick="UIManager.toggleSettings(true)">⚙️ ضبط</div>
        <canvas id="game"></canvas>
    </div>

    <div id="settingsModal" class="screen" style="display:none; z-index: 2000;">
        <h2>🎚️ الإعدادات</h2>
        <button onclick="UIManager.toggleSettings(false)">إغلاق</button>
    </div>

</body>
</html>
