<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>دخول الأدمن - THE LAST OPERATOR</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --accent: #00d2ff; --bg: #0f172a; }
        body { background: var(--bg); color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        
        /* شاشة القفل */
        #lock-screen { text-align: center; background: #1e293b; padding: 40px; border-radius: 20px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        input[type="password"] { padding: 12px; border-radius: 8px; border: none; width: 200px; text-align: center; font-size: 1.2rem; margin-bottom: 15px; }
        
        /* محتوى الأدمن (مخفي في البداية) */
        #admin-content { display: none; width: 95%; max-width: 1200px; height: 90vh; overflow-y: auto; background: #1e293b; padding: 20px; border-radius: 15px; }
        
        .hidden { display: none !important; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border-bottom: 1px solid #334155; text-align: center; font-size: 13px; }
        button { cursor: pointer; padding: 8px 15px; border-radius: 6px; border: none; font-weight: bold; }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-save { background: #2ecc71; color: white; }
        input[type="number"] { padding: 6px; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 5px; text-align: center; }
    </style>
</head>
<body>

<div id="lock-screen">
    <h2 style="color: var(--accent)">لوحة التحكم المحمية 🛡️</h2>
    <p>أدخل كلمة مرور الأدمن للمتابعة</p>
    <input type="password" id="admin-pass" placeholder="****">
    <br>
    <button class="btn-primary" onclick="checkPass()">دخول 🔓</button>
</div>

<div id="admin-content">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h1>لوحة الإدارة اليدوية الفورية 🛠️</h1>
        <button class="btn-primary" onclick="loadData()">تحديث القائمة 🔄</button>
    </div>
    <div id="msg" style="color: var(--accent); margin: 10px 0;"></div>
    <table>
        <thead>
            <tr>
                <th>ID اللاعب</th>
                <th>البريد الإلكتروني</th>
                <th>المستوى الحالي</th>
                <th>الرصيد (🪙 كوينز)</th>
                <th>الرصيد (💵 كاش)</th>
                <th>إجراء</th>
            </tr>
        </thead>
        <tbody id="rows"></tbody>
    </table>
</div>

<script>
    // --- إعدادات الربط بقاعدة البيانات والسر ---
    const PASS_KEY = "500500"; 
    const URL = "https://ctnuuvdakmqpbuzhrsos.supabase.co";
    const KEY = "sb_publishable_1FObDLbOBvb3CBqfCOOQkw_2p6v1ObQ";
    const supabaseAdmin = supabase.createClient(URL, KEY);

    // قائمة تخزين مؤقت لبيانات اللاعبين لمقارنة التغييرات وتوثيقها بالسجل
    let cachedPlayers = {};

    function checkPass() {
        const input = document.getElementById('admin-pass').value;
        if (input === PASS_KEY) {
            document.getElementById('lock-screen').classList.add('hidden');
            document.getElementById('admin-content').style.display = 'block';
            loadData();
        } else {
            alert("كلمة المرور خاطئة! ❌");
        }
    }

    async function loadData() {
        const msg = document.getElementById('msg');
        msg.innerText = "جاري جلب بيانات اللاعبين من السيرفر...";
        
        // جلب البيانات من الجدول
        const { data, error } = await supabaseAdmin.from('players').select('*');

        if (error) {
            msg.innerText = "خطأ في الاتصال: " + error.message;
            return;
        }

        const tbody = document.getElementById('rows');
        tbody.innerHTML = '';
        cachedPlayers = {}; // إعادة تعيين الكاش

        data.forEach(p => {
            // حفظ نسخة أصلية لمقارنتها عند الحفظ لمعرفة ما إذا قام الآدمن بزيادة أو نقص الرصيد
            cachedPlayers[p.id] = p;

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td style="font-family: monospace; color: #94a3b8;">${p.id}</td>
                <td>${p.email || 'لاعب ضيف'}</td>
                <td><input type="number" style="width:60px" id="lv-${p.id}" value="${p.max_level || p.level || 1}"></td>
                <td><input type="number" style="width:100px" id="co-${p.id}" value="${p.coins || 0}"></td>
                <td><input type="number" style="width:100px" id="ca-${p.id}" value="${p.cash || 0}"></td>
                <td><button class="btn-save" onclick="updatePlayer('${p.id}')">تطبيق وحفظ ✅</button></td>
            `;
            tbody.appendChild(tr);
        });
        msg.innerText = "تم تحديث كافة البيانات بنجاح المباشر.";
    }

    async function updatePlayer(id) {
        const msg = document.getElementById('msg');
        const oldData = cachedPlayers[id];

        // قراءة القيم الجديدة المدخلة يدوياً من الأدمن
        const nextLvl = parseInt(document.getElementById(`lv-${id}`).value) || 1;
        const nextCoins = parseInt(document.getElementById(`co-${id}`).value) || 0;
        const nextCash = parseInt(document.getElementById(`ca-${id}`).value) || 0;

        let currentHistory = oldData.purchase_history || [];

        // 🧠 المقارنة الذكية لمعرفة نوع العملية (شحن أم خصم) لإضافتها في سجل المستخدم
        if (nextCoins !== (oldData.coins || 0)) {
            const diff = nextCoins - (oldData.coins || 0);
            const statusSymbol = diff > 0 ? "✅ تعديل إداري" : "🛑 خصم إداري";
            currentHistory.unshift({
                name: `${statusSymbol}: ${diff > 0 ? '+' : ''}${diff.toLocaleString()} كوينز`,
                date: new Date().toLocaleString('ar-EG'),
                cost: "لوحة التحكم"
            });
        }

        if (nextCash !== (oldData.cash || 0)) {
            const diff = nextCash - (oldData.cash || 0);
            const statusSymbol = diff > 0 ? "✅ تعديل إداري" : "🛑 خصم إداري";
            currentHistory.unshift({
                name: `${statusSymbol}: ${diff > 0 ? '+' : ''}${diff.toLocaleString()} كاش`,
                date: new Date().toLocaleString('ar-EG'),
                cost: "لوحة التحكم"
            });
        }

        msg.innerText = "جاري حفظ التعديلات وإرسال الإشعار الفوري للمستخدم...";

        // إرسال التعديل النهائي لـ Supabase
        const { error } = await supabaseAdmin
            .from('players')
            .update({ 
                max_level: nextLvl, 
                level: nextLvl, // للتوافق مع مسمى الحقل القديم أو الجديد
                coins: nextCoins, 
                cash: nextCash,
                purchase_history: currentHistory
            })
            .eq('id', id);

        if (error) {
            alert("فشل الحفظ: " + error.message);
            msg.innerText = "حدث خطأ أثناء الحفظ.";
        } else {
            msg.innerText = "🚀 تم الحفظ بنجاح وتحديث شاشة اللاعب فوراً!";
            loadData(); // إعادة التحميل لضمان مزامنة البيانات بالكامل
        }
    }
</script>
</body>
</html>
