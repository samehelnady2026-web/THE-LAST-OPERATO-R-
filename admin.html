<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>دخول الأدمن - THE LAST OPERATOR</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --accent: #00d2ff; --bg: #0f172a; }
        body { background: var(--bg); color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        
        /* شاشة القفل */
        #lock-screen { text-align: center; background: #1e293b; padding: 40px; border-radius: 20px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        input[type="password"] { padding: 12px; border-radius: 8px; border: none; width: 200px; text-align: center; font-size: 1.2rem; margin-bottom: 15px; }
        
        /* محتوى الأدمن (مخفي في البداية) */
        #admin-content { display: none; width: 95%; max-width: 1100px; height: 90vh; overflow-y: auto; background: #1e293b; padding: 20px; border-radius: 15px; }
        
        .hidden { display: none !important; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border-bottom: 1px solid #334155; text-align: center; }
        button { cursor: pointer; padding: 8px 15px; border-radius: 6px; border: none; font-weight: bold; }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-save { background: #2ecc71; color: white; }
    </style>
</head>
<body>

<div id="lock-screen">
    <h2 style="color: var(--accent)">لوحة التحكم المحمية 🛡️</h2>
    <p>أدخل كلمة مرور الأدمن للمتابعة</p>
    <input type="password" id="admin-pass" placeholder="****">
    <br>
    <button class="btn-primary" onclick="checkPass()">دخول 🔓</button>
</div>

<div id="admin-content">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h1>إدارة اللاعبين 🛠️</h1>
        <button class="btn-primary" onclick="loadData()">تحديث 🔄</button>
    </div>
    <div id="msg" style="color: #888; margin: 10px 0;"></div>
    <table>
        <thead>
            <tr>
                <th>البريد</th>
                <th>المستوى</th>
                <th>🪙</th>
                <th>💵</th>
                <th>الحالة</th>
                <th>إجراء</th>
            </tr>
        </thead>
        <tbody id="rows"></tbody>
    </table>
</div>

<script>
    // --- إعداداتك ---
    const PASS_KEY = "500500"; // ⬅️ غير كلمة السر من هنا
    const URL = "https://ctnuuvdakmqpbuzhrsos.supabase.co";
    const KEY = "sb_publishable_1FObDLbOBvb3CBqfCOOQkw_2p6v1ObQ";
    const supabaseAdmin = supabase.createClient(URL, KEY);

    // دالة التحقق من كلمة السر
    function checkPass() {
        const input = document.getElementById('admin-pass').value;
        if (input === PASS_KEY) {
            document.getElementById('lock-screen').classList.add('hidden');
            document.getElementById('admin-content').style.display = 'block';
            loadData(); // جلب البيانات فور الدخول الصحيح
        } else {
            alert("كلمة المرور خاطئة! ❌");
        }
    }

    // جلب البيانات (كما في الكود السابق)
    async function loadData() {
        const msg = document.getElementById('msg');
        msg.innerText = "جاري تحميل البيانات...";
        const { data, error } = await supabaseAdmin.from('players').select('*');

        if (error) {
            msg.innerText = "خطأ: " + error.message;
            return;
        }

        const tbody = document.getElementById('rows');
        tbody.innerHTML = '';
        data.forEach(p => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td style="font-size:0.8rem">${p.email}</td>
                <td><input type="number" style="width:50px" id="lv-${p.email}" value="${p.level}"></td>
                <td><input type="number" style="width:60px" id="co-${p.email}" value="${p.coins}"></td>
                <td><input type="number" style="width:60px" id="ca-${p.email}" value="${p.cash}"></td>
                <td style="color:${p.is_banned ? 'red' : 'green'}">${p.is_banned ? 'محظور' : 'نشط'}</td>
                <td><button class="btn-save" onclick="updatePlayer('${p.email}')">حفظ</button></td>
            `;
            tbody.appendChild(tr);
        });
        msg.innerText = "تم تحديث البيانات.";
    }

    async function updatePlayer(email) {
        const lv = document.getElementById(`lv-${email}`).value;
        const co = document.getElementById(`co-${email}`).value;
        const ca = document.getElementById(`ca-${email}`).value;

        const { error } = await supabaseAdmin
            .from('players')
            .update({ level: lv, coins: co, cash: ca })
            .eq('email', email);

        if (error) alert(error.message);
        else loadData();
    }
</script>
</body>
</html>
