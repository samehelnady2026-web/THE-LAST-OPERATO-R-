<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تفعيل رقم الهاتف - THE LAST OPERATOR</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #050505; color: white; font-family: Arial; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: rgba(255,255,255,0.1); padding: 30px; border-radius: 25px; border: 1px solid #ff4081; text-align: center; backdrop-filter: blur(10px); width: 320px; }
        input { width: 100%; padding: 12px; margin: 20px 0; border-radius: 12px; border: none; text-align: center; font-size: 1.1rem; }
        button { background: #ff4081; color: white; border: none; padding: 12px; border-radius: 50px; cursor: pointer; font-weight: bold; width: 100%; }
    </style>
</head>
<body>
    <div id="msg">جاري فحص الرابط...</div>
    <div id="setup" class="card" style="display:none">
        <h2>📱 خطوة أخيرة!</h2>
        <p>أدخل رقم هاتفك لربطه بحسابك والدخول به مستقبلاً</p>
        <input type="tel" id="phone" placeholder="+201234567890">
        <button onclick="savePhone()">ربط الهاتف الآن</button>
    </div>

    <script>
        const SB_URL = "https://your-project.supabase.co";
        const SB_KEY = "your-anon-key";
        const supabase = supabase.createClient(SB_URL, SB_KEY);

        window.onload = async () => {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                document.getElementById('msg').style.display = 'none';
                document.getElementById('setup').style.display = 'block';
            } else {
                document.getElementById('msg').innerText = "رابط غير صالح.";
            }
        };

        async function savePhone() {
            const p = document.getElementById('phone').value;
            const { data: { user } } = await supabase.auth.getUser();
            const { error } = await supabase.from('players').update({ phone: p }).eq('email', user.email);
            if (!error) {
                alert("تم الربط بنجاح! يمكنك الآن العودة للعبة والدخول برقمك.");
                window.location.href = "index.html";
            }
        }
    </script>
</body>
  </html>
