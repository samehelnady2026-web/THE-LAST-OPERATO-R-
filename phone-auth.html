<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ربط الهاتف - THE LAST OPERATOR</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #050505; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; }
        .card { background: rgba(255,255,255,0.1); padding: 30px; border-radius: 20px; text-align: center; border: 1px solid #00d2ff; }
        input { padding: 10px; border-radius: 10px; border: none; width: 100%; margin: 15px 0; }
        button { background: #00d2ff; border: none; padding: 10px 20px; border-radius: 50px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div id="setup" class="card">
        <h2>📱 تم التفعيل!</h2>
        <p>اربط رقم هاتفك الآن للدخول به مستقبلاً</p>
        <input type="tel" id="ph" placeholder="+201234567890">
        <button onclick="savePh()">حفظ البيانات</button>
    </div>
    <script>
        const supabase = supabase.createClient("https://ctnuuvdakmqpbuzhrsos.supabase.co", "sb_publishable_1FObDLbOBvb3CBqfCOOQkw_2p6v1ObQ");
        async function savePh() {
            const { data: { user } } = await supabase.auth.getUser();
            const ph = document.getElementById('ph').value;
            const { error } = await supabase.from('players').update({ phone: ph }).eq('email', user.email);
            if (!error) { alert("تم الربط!"); window.location.href = "index.html"; }
        }
    </script>
</body>
</html>
