<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تفعيل رقم الهاتف - THE LAST OPERATOR</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #050505; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; margin: 0; }
        .card { background: rgba(255,255,255,0.1); padding: 30px; border-radius: 20px; text-align: center; border: 1px solid #00d2ff; backdrop-filter: blur(10px); width: 320px; }
        input { padding: 12px; border-radius: 10px; border: none; width: 100%; margin: 15px 0; text-align: center; font-size: 1.1rem; }
        button { background: #00d2ff; color: #000; border: none; padding: 12px 25px; border-radius: 50px; cursor: pointer; font-weight: bold; width: 100%; }
        .error-msg { color: #ff4081; font-size: 0.8rem; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <div id="loader">جاري التحقق من الجلسة...</div>

    <div id="setup" class="card" style="display:none">
        <h2>📱 خطوة واحدة متبقية</h2>
        <p>أدخل رقم هاتفك لربط حسابك والدخول للعبة</p>
        <input type="tel" id="ph" placeholder="+201234567890">
        <button id="save-btn" onclick="savePh()">ربط الهاتف ودخول اللعبة</button>
        <div id="err" class="error-msg"></div>
    </div>

    <script>
        // التأكد من البيانات الصحيحة
        const SB_URL = "https://ctnuuvdakmqpbuzhrsos.supabase.co";
        const SB_KEY = "sb_publishable_1FObDLbOBvb3CBqfCOOQkw_2p6v1ObQ";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        window.onload = async () => {
            // التحقق هل المستخدم سجل دخوله فعلياً عبر رابط الإيميل
            const { data: { session }, error } = await supabaseClient.auth.getSession();
            
            if (session && session.user) {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('setup').style.display = 'block';
            } else {
                document.getElementById('loader').innerText = "خطأ: يجب الضغط على الرابط المرسل للإيميل أولاً.";
                console.error("Session Error:", error);
            }
        };

        async function savePh() {
            const btn = document.getElementById('save-btn');
            const errDiv = document.getElementById('err');
            const phoneVal = document.getElementById('ph').value;

            if(!phoneVal) { alert("أدخل الرقم أولاً"); return; }

            btn.innerText = "جاري الحفظ...";
            btn.disabled = true;

            const { data: { user } } = await supabaseClient.auth.getUser();

            // محاولة تحديث البيانات - جربنا 'players' (جمع) 
            // إذا كان اسم جدولك في سوبابيس 'player' (مفرد) غيرها في السطر القادم
            const { error } = await supabaseClient
                .from('players') 
                .upsert({ 
                    email: user.email, 
                    phone: phoneVal,
                    coins: 1000,
                    cash: 100,
                    level: 1
                }, { onConflict: 'email' });

            if (error) {
                console.error("Database Error:", error);
                errDiv.innerText = "فشل الحفظ: " + error.message;
                errDiv.style.display = 'block';
                btn.innerText = "حاول مرة أخرى";
                btn.disabled = false;
                
                // تنبيه إضافي للمساعدة في التشخيص
                alert("حدث خطأ في قاعدة البيانات: " + error.message);
            } else {
                alert("تم التفعيل والربط بنجاح! استعد للعب.");
                // التوجيه للملف الرئيسي (تأكد أن الاسم index.html)
                window.location.href = "index.html";
            }
        }
    </script>
</body>
            </html>
